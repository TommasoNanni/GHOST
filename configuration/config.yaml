data:
  egoexo_data_root: "/cluster/project/cvg/data/EgoExo_georgiatech/raw/takes"
  rich_data_root: "/cluster/project/cvg/data/rich/ps/project/multi-ioi/rich_release/train"
  output_directory: "/cluster/project/cvg/students/tnanni/ghost/test_outputs/sam3_segmentation_test"
  slice: 1 # Number of scenes to load (set for testing)
  exclude_egocentric: true # Exclude egocentric videos for simplicity
  smplx_model_path: "body_models/SMPLX_NEUTRAL.npz"
  mhr_model_path: null

segmentation:
  checkpoint_path: "/cluster/project/cvg/students/tnanni/ghost/checkpoints/sam3/sam3.pt" # Path to SAM3 checkpoint; null = auto-download from HuggingFace
  text_prompt: "person" # Text query for SAM3 detection
  redetect_interval: 5 # Add text prompt every N frames so late arrivals are detected

parameters_extraction:
  reid_threshold: 0.55
  gallery_moving_average_alpha: 0.85
  reid_match_window: 20 # Number of frames to retry ReID matching for new tracks
  sam3d_id: "facebook/sam-3d-body-dinov3"
  sam3d_step: 1 # Predict using sam3d every sam3d_step frames
  bbox_padding: 0.2 # Padding added to the bounding box before cropping the image for SAM3D.
  # Cross-view re-identification (run once per scene after all per-video estimation)
  cross_view_reid_threshold: 0.4 # Min hybrid similarity to accept a cross-view match
  cross_view_appearance_weight: 0.7 # Weight of DINOv3 appearance features
  cross_view_shape_weight: 0.3 # Weight of SMPL-X shape (beta) features

fusion:
  loss:
    VPoser_path: "/cluster/project/cvg/students/tnanni/ghost/checkpoints/V02_05/snapshots/V02_05_epoch=13_val_loss=0.03.ckpt"
